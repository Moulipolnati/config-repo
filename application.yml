spring:
  datasource:
    url: jdbc:mysql://localhost:3306/microservices
    username: root
    password: your_password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health, info, refresh

endpoint:
  health:
    show-details: always
